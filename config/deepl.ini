[Service]
Name=DeepL Translate
Order=13
AutoSwapLanguage=1
ColorRecent=11558912
ValueType=Language

RealTimeTranslation=1
TranslateOnlyByButton=0
Visible=1
AllowProxy=1

[Service Description]
0=DeepL Translate — this configuration uses an unofficial web endpoint of DeepL Translator by DeepL SE to perform text translation between supported languages. It sends a structured JSON request similar to the one used internally by the DeepL web application and returns the translated text in JSON format.
1=
2=Legal note: this endpoint is part of DeepL’s web interface infrastructure and is not an officially published or supported public API. According to DeepL’s Terms of Service, automated access to the service via the web interface (including reverse-engineered or non-documented endpoints) is not considered an intended or authorized integration method. The only officially supported way to use DeepL programmatically is through the DeepL API.
3=
4=For this reason, this configuration should be considered an example of a technical implementation and is intended for informational and educational purposes. It is not an officially endorsed integration method.
5=
6=For compliant and production usage, it is recommended to use the official DeepL API, which provides documented access, authentication, and licensed usage terms:
7=
8=https://www.deepl.com/pro-api

[Request]
Method=POST
UserAgent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Safari/537.36
EncodeText=0
Url=https://www2.deepl.com/jsonrpc?method=LMT_handle_texts
ContentType=application/json
PostData={\r\n  "jsonrpc": "2.0",\r\n  "method"{spacechar}: "LMT_handle_texts",\r\n  "id": {ID},\r\n  "params": {\r\n    "splitting": "newlines",\r\n    "lang": {\r\n      "source_lang_user_selected": "{source}",\r\n      "target_lang": "{target}"\r\n    },\r\n    "texts": [\r\n      {\r\n        "text": "{text}",\r\n        "requestAlternatives": {altcount}\r\n      }\r\n    ],\r\n    "timestamp": {timestampmod}\r\n  }\r\n}
Accept=*/*
MaxLength=5000

[Headers]
0=Accept-Language=de-DE,de;q=0.8,en-US;q=0.7,en;q=0.6
1=Content-Type=application/json; charset=utf-8
2=Origin=https://www.deepl.com
3=Referer=https://www.deepl.com/translator
4=Sec-Fetch-Dest=empty
5=Sec-Fetch-Mode=cors
6=Sec-Fetch-Site=same-site
7=Pragma=no-cache
8=Cache-Control=no-cache
9=Connection=keep-alive

[Initial Request]
UserAgent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Safari/537.36
Url=https://www.deepl.com/translator
LiveTime=600

[Initial Headers]
Accept=text/html,application/xhtml
+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8
Accept-Language=en-US,en;q=0.9
Accept-Encoding=gzip, deflate, br
Host=www.deepl.com
Cache-Control=max-age=0
Connection=keep-alive
Upgrade-Insecure-Requests=1
Sec-Fetch-Dest=document
Sec-Fetch-Mode=navigate
Sec-Fetch-Site=none
Sec-Fetch-User=?1

[Response]
JsonPointer=/result/texts/0/text; /error/message; {{<h1[^>]*>(.*?)</h1>[*]}#10{<p[^>]*>(.*?)</p>[*#10]}}!/result/texts/0/text

[Parameters]
EncodeCustomParameters=1

[Script Parameters]
0=#//------------------------------------------------------------------------------
1=#// User script for DeepL request preparation
2=#//------------------------------------------------------------------------------
3=#const
4=#  DEEPL_SHORT_TEXT_LIMIT  = 80;
5=#  DEEPL_MEDIUM_TEXT_LIMIT = 280;
6=#  DEEPL_REQUEST_ALTERNATIVES = 1;
7=#
8=#//------------------------------------------------------------------------------
9=#// Count how many times 'i' appears in S
10=#//------------------------------------------------------------------------------
11=#function CountCharI(const S: string): Integer;
12=#var
13=#  i: Integer;
14=#begin
15=#  Result := 0;
16=#  for i := 1 to Length(S) do
17=#    if S[i] = 'i' then
18=#      Inc(Result);
19=#end;
20=#
21=#//------------------------------------------------------------------------------
22=#// Implementation of the modified timestamp logic.
23=#// It uses the registered GetTimestamp function (from TOS.GetTimestamp).
24=#//------------------------------------------------------------------------------
25=#function GetTimestampMod(const AText: string): string;
26=#var
27=#  ts: Int64;
28=#  iCount, divisor: Integer;
29=#begin
30=#  ts := GetTimestamp; // Unix timestamp in milliseconds
31=#  iCount := CountCharI(AText);
32=#
33=#  if iCount = 0 then
34=#    Result := IntToStr(ts)
35=#  else begin
36=#    divisor := iCount + 1;
37=#    ts := ts - (ts mod divisor) + divisor; // round up to next multiple
38=#    Result := IntToStr(ts);
39=#  end;
40=#end;
41=#
42=#//------------------------------------------------------------------------------
43=#// Choose number of alternative translations (0 or 1).
44=#//------------------------------------------------------------------------------
45=#function ChooseAlternativesCount(const Text: string): Integer;
46=#var
47=#  len, i, lineBreaks: Integer;
48=#begin
49=#  // Empty text → 0
50=#  if Text = '' then
51=#  begin
52=#    Result := 0;
53=#    Exit;
54=#  end;
55=#
56=#  len := Length(Text);
57=#
58=#  // Count line breaks (#10 = LF)
59=#  lineBreaks := 0;
60=#  for i := 1 to len do
61=#    if Text[i] = #10 then
62=#      Inc(lineBreaks);
63=#
64=#  // Any line break or too long → 0
65=#  if (lineBreaks >= 1) or (len > DEEPL_MEDIUM_TEXT_LIMIT) then
66=#  begin
67=#    Result := 0;
68=#    Exit;
69=#  end;
70=#
71=#  // Medium length (> 80) → 1
72=#  if len > DEEPL_SHORT_TEXT_LIMIT then
73=#  begin
74=#    Result := 1;
75=#    Exit;
76=#  end;
77=#
78=#  // Short text (≤ 80, no breaks) → DEEPL_REQUEST_ALTERNATIVES (= 1)
79=#  Result := DEEPL_REQUEST_ALTERNATIVES;
80=#end;
81=#
82=#//------------------------------------------------------------------------------
83=#// Main block – executed when the script runs
84=#//------------------------------------------------------------------------------
85=#var
86=#  txt, src, tgt: string;
87=#  randomID: Int64;
88=#  altCount: Integer;
89=#  spaceChar: string;
90=#begin
91=#  // 1. Retrieve input parameters using GetParam
92=#  txt := GetParam('text');
93=#  src := GetParam('source');
94=#  tgt := GetParam('target');
95=#
96=#  // 2. Compute the DeepL-compatible timestamp and store it
97=#  SetOutput('timestampmod', GetTimestampMod(txt));
98=#
99=#  // 3. Generate a random ID matching the DeepL frontend pattern:
100=#  // Use modulo to constrain the random number to the 0..99998 range
101=#  randomID := ((GetRandom(6) mod 99999) + 100000) * Int64(1000);
102=#  SetOutput('ID', IntToStr(randomID));
103=#
104=#  // 4. Check the "space before colon" condition used by the real DeepL client:
105=#  //    ((id + 5) mod 29 = 0) or ((id + 3) mod 13 = 0)  →  use "method" : "
106=#  if ((randomID + 5) mod 29 = 0) or ((randomID + 3) mod 13 = 0) then
107=#    spaceChar := ' '
108=#  else
109=#    spaceChar := '';
110=#  SetOutput('spacechar', spaceChar);
111=#
112=#  // 5. Alternatives count based on text length
113=#  SetOutput('altcount', IntToStr(ChooseAlternativesCount(txt)));
114=#end.

