[Service Description]
0=LibreTranslate (Fedilab public instance) is an open-source machine translation service based on the LibreTranslate project. It provides a simple HTTP JSON API for translating text between multiple languages using a public endpoint hosted by Fedilab.
1=
2=This instance is not an official commercial translation API but a community-operated public deployment of LibreTranslate. It may be subject to usage limits, rate limiting, downtime, or changes without prior notice. Performance and availability depend entirely on the instance operator.
3=
4=Legal note: LibreTranslate itself is open-source software, but public instances are provided as-is and may have their own acceptable use policies. Automated or high-volume usage may be restricted by the operator. Users are responsible for ensuring compliance with the terms of the specific instance they use, as well as applicable laws and regulations.
5=
6=For stable, self-controlled and legally predictable usage, it is recommended to self-host LibreTranslate or use a trusted deployment with defined service terms:
7=
8=https://libretranslate.com
9=
10=The user is solely responsible for how this configuration is used and must ensure compliance with the service provider’s policies, licensing conditions, and applicable regulations.
