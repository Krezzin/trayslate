[Service]
Name=Pollinations AI - API Ask
Order=8
AutoSwapLanguage=0
ColorRecent=7360544
ValueType=Language

RealTimeTranslation=0
TranslateOnlyByButton=1
Visible=1

[Service Description]
0=Pollinations AI – API Ask — this configuration uses the official Pollinations AI API and requires a personal API key. The first time you use the service, you will be prompted to enter your API key automatically. A free API key can be obtained by creating an account on the Pollinations AI website.
1=
2=After entering a valid API key, the configuration can be used with various AI action patterns such as answering questions, summarizing, rewriting, explaining, generating ideas, and other text-processing tasks.
3=
4=The API key is stored locally in the settings and can be changed at any time through the User Parameters section.

[Request]
Method=POST
EncryptText=1
UserAgent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/145.0.0.0 Safari/537.36
EncodeText=0
Url=https://gen.pollinations.ai/v1/chat/completions
ContentType=application/json
PostData={\r\n    "model": "openai",\r\n    "messages": [\r\n      {"role": "system", "content": "{prompt}"},\r\n      {"role": "user", "content": "{data}"}\r\n    ],\r\n    "temperature": 0.5\r\n}
Accept=*/*
MaxLength=0

[Response]
JsonPointer=/choices/0/message/content;/error/*;!/choices/0/message/content{Failed to generate an answer as a result of reasoning}

[Headers]
Connection=keep-alive
Authorization=Bearer {API Key for polinations.ai}

[Parameters]
EncodeCustomParameters=0

[Custom Parameters]
prompt=Perform the user-requested action: "{source}". Return the answer in {target} language; if it is "auto", use the same language as the request. If the provided material does not match the requested action, respond to the user in their language: "It is not possible to perform {requested action} with the provided data." Just return the result—no explanations, reasoning, or extra comments. No code blocks, just plain text. Do not use formatting such as Markdown tables, etc.
data=Apply it to the provided material: {text}
API Key for polinations.ai=

