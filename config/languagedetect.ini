[Service Description]
0=Google Translate (unofficial gtx endpoint) — this configuration uses an unofficial Google Translate web endpoint to translate text between languages. It sends a GET request to the public Google Translate interface API with source language, target language, and input text, and returns a JSON response containing segmented translation results. The configuration extracts the translated text from the JSON structure and supports a large number of languages with optional auto language detection.
1=
2=Legal note: this endpoint is not part of the official Google Cloud Translation API and is not intended for public or commercial integration. It is an undocumented web interface that may be restricted, rate-limited, or changed at any time by Google. In many cases, automated or programmatic access to this endpoint may violate Google’s Terms of Service. Therefore, this configuration is provided strictly for educational, experimental, and compatibility purposes only.
3=
4=For legal and stable usage, it is recommended to use the official Google Cloud Translation API, which provides authenticated access, documentation, and compliance guarantees:
5=
6=https://cloud.google.com/translate
7=
8=The user is solely responsible for how this configuration is used and must ensure compliance with the service provider’s terms, licensing conditions, and applicable regulations.

[Request]
Method=GET
UserAgent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/145.0.0.0 Safari/537.36
EncodeText=1
Url=https://translate.googleapis.com/translate_a/single?client=gtx&dt=ld&sl=auto&tl=en&q={text}
Accept=application/json
MaxLength=0

[Headers]
Connection=keep-alive

[Response]
JsonPointer=/2

[Parameters]
EncodeCustomParameters=1
