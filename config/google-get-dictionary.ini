[Service]
Name=Google Dictionary
Order=16
AutoSwapLanguage=1
ColorRecent=1056928
ValueType=Language

RealTimeTranslation=1
TranslateOnlyByButton=0
Visible=1
AllowProxy=1

[Service Description]
0=Google Translate (dictionary mode via gtx endpoint) — this configuration uses an unofficial Google Translate web endpoint with the `dt=bd` parameter, which is intended to return dictionary-style results such as meanings, alternative translations, and lexical variants. It sends a GET request with source language, target language, and input text, and parses structured dictionary data from the JSON response. The configuration includes a fallback parsing rule to handle cases where dictionary data is not available.
1=
2=Legal note: this endpoint is part of an undocumented Google Translate web interface and is not officially supported for third-party applications. It is subject to change, rate limiting, or blocking at any time, and automated usage may violate Google’s Terms of Service. Therefore, this configuration is provided strictly for educational, experimental, and non-commercial purposes.
3=
4=For stable and legally compliant usage, it is recommended to use the official Google Cloud Translation API, which provides authenticated access, documented dictionary/translation capabilities, and guaranteed service behavior:
5=
6=https://cloud.google.com/translate
7=
8=The user is solely responsible for ensuring that any use of this configuration complies with applicable terms, licensing requirements, and legal restrictions of the service provider.

[Request]
Method=GET
UserAgent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/145.0.0.0 Safari/537.36
EncodeText=1
Url=https://translate.googleapis.com/translate_a/single?client=gtx&dt=bd&sl={source}&tl={target}&q={text}
Accept=application/json
MaxLength=0

[Headers]
Connection=keep-alive

[Response]
JsonPointer=/1/*/1;{No Data}!/1/0/1

[Parameters]
EncodeCustomParameters=1

