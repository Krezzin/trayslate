[Service]
AutoSwapLanguage=1
Order=14
ValueType=Language
Name=MyMemory Translate
ColorRecent=6316144

RealTimeTranslation=1
TranslateOnlyByButton=0
Visible=1
AllowProxy=1

[Service Description]
0=MyMemory Translate — this configuration uses the public API of MyMemory Translation API to translate text between language pairs. It sends a GET request with the input text and language pair parameters, and returns a JSON response containing the translated text. The service is a large translation memory system that combines user-contributed translations and machine translation sources.
1=
2=Legal note: MyMemory provides a publicly accessible API intended for light and non-commercial use. It is generally usable for low-frequency requests such as a desktop translation tool where the user manually triggers translations. However, it has usage limits and may restrict excessive or automated traffic.
3=
4=For long-term, commercial, or high-reliability use, it is recommended to use official translation APIs that provide authentication, stable quotas, and guaranteed service levels. MyMemory also offers paid plans for higher usage and commercial access:
5=
6=https://mymemory.translated.net/doc/spec.php
7=https://mymemory.translated.net/services/translation-api.php
8=
9=The user is responsible for ensuring appropriate use according to the service’s terms and limitations.

[Request]
Method=GET
UserAgent=Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:148.0) Gecko/20100101 Firefox/148.0
EncodeText=1
Url=https://api.mymemory.translated.net/get?q={text}&langpair={source}|{target}&de={any E-Mail for MyMemory}
Accept=application/json
MaxLength=8000

[Headers]
Connection=keep-alive

[Response]
JsonPointer=/responseData/translatedText

[Parameters]
EncodeCustomParameters=1

